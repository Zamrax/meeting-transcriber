name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: meeting-transcriber-windows-x64.exe
            binary: target/x86_64-pc-windows-msvc/release/meeting-transcriber.exe

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: meeting-transcriber-macos-arm64.zip
            binary: target/aarch64-apple-darwin/release/meeting-transcriber

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: meeting-transcriber-macos-x64.zip
            binary: target/x86_64-apple-darwin/release/meeting-transcriber

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: meeting-transcriber-linux-x64
            binary: target/x86_64-unknown-linux-gnu/release/meeting-transcriber

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgtk-3-dev

      - name: Build release binary
        run: cargo build --release --target "$BUILD_TARGET"
        env:
          BUILD_TARGET: ${{ matrix.target }}

      - name: Package Artifacts
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            APP_NAME="MeetingAssistant"
            BUNDLE_DIR="${APP_NAME}.app/Contents/MacOS"
            mkdir -p "$BUNDLE_DIR"
            cp "${{ matrix.binary }}" "$BUNDLE_DIR/${APP_NAME}"
            
            # Ensure the binary is executable
            chmod +x "$BUNDLE_DIR/${APP_NAME}"
            
            cat <<EOF > "${APP_NAME}.app/Contents/Info.plist"
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>CFBundleExecutable</key>
                <string>${APP_NAME}</string>
                <key>CFBundleIdentifier</key>
                <string>com.zamrax.meeting-assistant</string>
                <key>CFBundleName</key>
                <string>${APP_NAME}</string>
                <key>CFBundlePackageType</key>
                <string>APPL</string>
                <key>CFBundleShortVersionString</key>
                <string>1.0.0</string>
                <key>LSMinimumSystemVersion</key>
                <string>10.12</string>
            </dict>
            </plist>
            EOF
            
            zip -r "${{ matrix.artifact }}" "${APP_NAME}.app"
          else
            cp "${{ matrix.binary }}" "${{ matrix.artifact }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifact
          path: ${{ matrix.artifact }}
      
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
